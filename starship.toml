# Starship prompt — https://starship.rs
#
# Symlinked to ~/.config/starship.toml by bootstrap.sh.
# Two-line prompt with git awareness, language versions that only show up
# inside their relevant projects, and a right-hand timestamp.

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

right_format = """$nodejs$python$golang$rust$kubernetes$aws$time"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold blue)"

[directory]
# Show up to 4 parent segments. `truncate_to_repo = false` means we
# don't collapse to just the repo name — so in ~/p/Dotfiles the prompt
# shows "~/p/Dotfiles", not "Dotfiles".
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = " took [$duration](bold yellow)"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]
style = "bold green"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow bold"

[golang]
symbol = " "

[rust]
symbol = " "

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "☸ "
style = "blue bold"
[kubernetes.context_aliases]
"arn:aws:eks:.*:cluster/(?P<cluster>[\\w-]+)" = "$cluster"

[aws]
format = '[$symbol($profile )(\[$duration\] )]($style)'
symbol = " "
style = "bold orange"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "bright-black"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold dimmed green"
